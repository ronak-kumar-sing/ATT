<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <title>AI Tutoring Tool</title>
</head>

<body class="bg-black text-white overflow-x-hidden">
  <!-- Animated Background -->
  <div class="fixed inset-0 z-0 opacity-20">
    <div class="absolute inset-0 bg-gradient-to-r from-purple-900/30 to-blue-900/30 animate-pulse"></div>
  </div>

  <!-- Hero Section -->
  <section class="relative min-h-screen flex flex-col items-center justify-center text-center z-10">
    <!-- Interactive Particle Background -->
    <canvas id="particleCanvas" class="absolute inset-0"></canvas>

    <div data-aos="fade-up" data-aos-duration="1000">
      <h1
        class="text-5xl font-bold sm:text-7xl bg-gradient-to-r from-purple-400 to-blue-400 bg-clip-text text-transparent glow">
        AI TUTORING TOOL
      </h1>
      <p class="mt-6 text-xl text-gray-300 sm:text-2xl max-w-2xl mx-auto">
        Boost your learning with AI-powered explanations and resources.
      </p>
      <button
        class="mt-8 px-8 py-4 text-lg font-semibold text-white bg-gradient-to-r from-purple-600 to-blue-600 rounded-xl hover:scale-105 transition-transform duration-300 shadow-xl hover:shadow-2xl"
        onclick="window.location.href='./login.html'">
        Try It Now
      </button>
    </div>

    <!-- Animated Scroll Indicator -->
    <div class="absolute bottom-8 animate-bounce">
      <svg class="w-12 h-12 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3" />
      </svg>
    </div>
  </section>

  <!-- Features Section -->
  <section class="py-20 relative z-10">
    <div class="max-w-7xl mx-auto px-6">
      <h2 class="text-3xl font-bold text-center mb-12">Features</h2>
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
        <div class="feature-card" data-aos="fade-up" data-aos-delay="100">
          <h3 class="text-xl font-semibold">Personalized Learning</h3>
          <p class="mt-4 text-gray-300">AI adapts to your learning style and pace.</p>
        </div>
        <div class="feature-card" data-aos="fade-up" data-aos-delay="200">
          <h3 class="text-xl font-semibold">24/7 Support</h3>
          <p class="mt-4 text-gray-300">Get help anytime, anywhere.</p>
        </div>
        <div class="feature-card" data-aos="fade-up" data-aos-delay="300">
          <h3 class="text-xl font-semibold">Interactive Tools</h3>
          <p class="mt-4 text-gray-300">Engage with quizzes, flashcards, and more.</p>
        </div>
      </div>
    </div>
  </section>

  <!-- Floating Action Button -->
  <div class="fixed bottom-8 right-8 z-50">
    <button class="floating-btn" onclick="showChat()">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
      </svg>
    </button>
  </div>

  <!-- AI Chat Interface -->
  <div id="chatInterface"
    class="hidden fixed bottom-24 right-8 w-96 bg-gray-800 rounded-xl shadow-xl transform transition-transform duration-300 ease-in-out">
    <div class="p-4 border-b border-gray-700">
      <h3 class="text-lg font-semibold">AI Chat Assistant</h3>
    </div>
    <div class="chat-messages p-4 h-64 overflow-y-auto"></div>
    <div class="message-input p-4 border-t border-gray-700">
      <input type="text" class="w-full p-2 bg-gray-700 rounded-lg text-white"
        placeholder="Ask our AI design assistant...">
      <button
        class="mt-2 px-4 py-2 bg-purple-600 rounded-lg hover:bg-purple-700 transition-colors duration-300">Send</button>
    </div>
  </div>

  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    // Initialize animations
    AOS.init({
      once: true,
      duration: 1000
    });

    // Particle Canvas Animation
    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let mouse = { x: null, y: null };
    window.addEventListener('mousemove', (e) => {
      mouse.x = e.x;
      mouse.y = e.y;
    });

    class Particle {
      constructor() {
        this.reset();
      }

      reset() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2 + 1;
        this.speedX = Math.random() * 3 - 1.5;
        this.speedY = Math.random() * 3 - 1.5;
        this.color = `rgba(${Math.random() * 255}, ${Math.random() * 255}, ${Math.random() * 255}, 0.5)`;
      }

      update() {
        this.x += this.speedX;
        this.y += this.speedY;

        // React to mouse
        const dx = mouse.x - this.x;
        const dy = mouse.y - this.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 100) {
          this.speedX = dx * 0.05;
          this.speedY = dy * 0.05;
        }

        if (this.x > canvas.width || this.x < 0) this.speedX *= -1;
        if (this.y > canvas.height || this.y < 0) this.speedY *= -1;
      }

      draw() {
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    const particles = Array(100).fill().map(() => new Particle());

    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(particle => {
        particle.update();
        particle.draw();
      });
      requestAnimationFrame(animateParticles);
    }

    animateParticles();

    // Interactive functions
    function showChat() {
      document.getElementById('chatInterface').classList.toggle('hidden');
    }

    // Responsive canvas
    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });
  </script>

  <style>
    .feature-card {
      @apply p-6 bg-gray-800 rounded-xl transition-all duration-300 relative overflow-hidden;
      transform: translateY(0);
    }

    .feature-card:hover {
      @apply bg-gray-700 shadow-2xl;
      transform: translateY(-5px);
    }

    .floating-btn {
      @apply p-4 bg-purple-600 rounded-full hover:bg-purple-700 transition-all duration-300 shadow-lg;
    }

    .glow {
      text-shadow: 0 0 10px rgba(147, 51, 234, 0.8), 0 0 20px rgba(147, 51, 234, 0.6);
    }
  </style>
</body>

</html>
