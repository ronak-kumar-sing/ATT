<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Call App</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">
  <div class="container mx-auto p-4">
    <h1 class="text-3xl font-bold text-center mb-8">Video Call</h1>

    <div class="flex flex-col md:flex-row gap-4">
      <!-- Video containers -->
      <div class="md:w-1/2 bg-gray-800 rounded-lg p-2">
        <video id="localVideo" autoplay muted class="w-full rounded-lg"></video>
      </div>

      <div class="md:w-1/2 bg-gray-800 rounded-lg p-2">
        <video id="remoteVideo" autoplay class="w-full rounded-lg"></video>
      </div>
    </div>

    <!-- Controls -->
    <div class="flex justify-center gap-4 mt-8">
      <button id="startCall" class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-lg">
        Start Call
      </button>
      <button id="toggleAudio" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg">
        Mute
      </button>
      <button id="toggleVideo" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg">
        Stop Video
      </button>
      <button id="endCall" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg">
        End Call
      </button>
    </div>
  </div>

  <script>
    let localStream;
    let remoteStream;
    let peerConnection;

    // Configuration (replace with your own STUN servers)
    const configuration = {
      iceServers: [
        {
          urls: "stun:stun.l.google.com:19302"
        }
      ]
    };

    // Get user media
    async function initLocalStream() {
      try {
        localStream = await navigator.mediaDevices.getUserMedia({
          video: true,
          audio: true
        });
        document.getElementById('localVideo').srcObject = localStream;
      } catch (error) {
        console.error('Error accessing media devices:', error);
      }
    }

    // Create peer connection
    function createPeerConnection() {
      peerConnection = new RTCPeerConnection(configuration);

      // Add local stream to connection
      localStream.getTracks().forEach(track => {
        peerConnection.addTrack(track, localStream);
      });

      // Receive remote stream
      peerConnection.ontrack = event => {
        remoteStream = event.streams[0];
        document.getElementById('remoteVideo').srcObject = remoteStream;
      };

      // ICE candidate handling
      peerConnection.onicecandidate = event => {
        if (event.candidate) {
          // Send candidate to remote peer (via signaling server)
          console.log('ICE candidate:', event.candidate);
        }
      };
    }

    // Start call
    document.getElementById('startCall').addEventListener('click', async () => {
      await initLocalStream();
      createPeerConnection();

      // Create offer
      const offer = await peerConnection.createOffer();
      await peerConnection.setLocalDescription(offer);

      // Send offer to remote peer (via signaling server)
      console.log('Offer:', offer);
    });

    // Toggle audio
    document.getElementById('toggleAudio').addEventListener('click', () => {
      const audioTracks = localStream.getAudioTracks();
      audioTracks.forEach(track => {
        track.enabled = !track.enabled;
      });
      document.getElementById('toggleAudio').textContent =
        audioTracks[0].enabled ? 'Mute' : 'Unmute';
    });

    // Toggle video
    document.getElementById('toggleVideo').addEventListener('click', () => {
      const videoTracks = localStream.getVideoTracks();
      videoTracks.forEach(track => {
        track.enabled = !track.enabled;
      });
      document.getElementById('toggleVideo').textContent =
        videoTracks[0].enabled ? 'Stop Video' : 'Start Video';
    });

    // End call
    document.getElementById('endCall').addEventListener('click', () => {
      if (peerConnection) {
        peerConnection.close();
        peerConnection = null;
      }
      if (localStream) {
        localStream.getTracks().forEach(track => track.stop());
      }
      if (remoteStream) {
        remoteStream.getTracks().forEach(track => track.stop());
      }
      document.getElementById('localVideo').srcObject = null;
      document.getElementById('remoteVideo').srcObject = null;
    });

    // Initialize local stream on page load
    initLocalStream();
  </script>
</body>

</html>
